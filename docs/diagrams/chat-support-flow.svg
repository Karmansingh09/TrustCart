<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380" role="img" aria-labelledby="title desc">
  <title id="title">TrustCart Chat and Support Flow</title>
  <desc id="desc">Customer asks a question in support chat, backend routes it to admin or seller, then returns the response to the customer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#18212f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowBack" markerWidth="14" markerHeight="14" refX="3" refY="7" orient="auto">
      <path d="M12,2 L2,7 L12,12 Z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="980" height="380" rx="28" fill="url(#bg)"/>
  <text x="40" y="56" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Chat &amp; Support Flow</text>
  <text x="40" y="86" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Support messages move through chat, API, and admin or seller response</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="58" y="122" width="150" height="58" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="133" y="157" fill="#e0f2fe" text-anchor="middle" font-size="16" font-weight="900">Customer</text>

    <rect x="298" y="122" width="150" height="58" rx="16" fill="#10233c" stroke="#4fd1c5" stroke-width="2"/>
    <text x="373" y="157" fill="#ecfeff" text-anchor="middle" font-size="16" font-weight="900">Support Chat</text>

    <rect x="538" y="122" width="150" height="58" rx="16" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="613" y="157" fill="#eff6ff" text-anchor="middle" font-size="16" font-weight="900">Backend API</text>

    <rect x="778" y="122" width="150" height="58" rx="16" fill="#431407" stroke="#fb923c" stroke-width="2"/>
    <text x="853" y="157" fill="#fff7ed" text-anchor="middle" font-size="16" font-weight="900">Admin/Seller</text>

    <line x1="133" y1="185" x2="133" y2="320" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="373" y1="185" x2="373" y2="320" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="613" y1="185" x2="613" y2="320" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="853" y1="185" x2="853" y2="320" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <path d="M133 218 L373 218" fill="none" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="253" y="210" fill="#cffafe" text-anchor="middle" font-size="13" font-weight="700">Ask question</text>

    <path d="M373 250 L613 250" fill="none" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="493" y="242" fill="#cffafe" text-anchor="middle" font-size="13" font-weight="700">Send request</text>

    <path d="M613 282 L853 282" fill="none" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="733" y="274" fill="#cffafe" text-anchor="middle" font-size="13" font-weight="700">Notify team</text>

    <path d="M853 314 L133 314" fill="none" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrowBack)"/>
    <text x="493" y="344" fill="#fde68a" text-anchor="middle" font-size="13" font-weight="700">Response returns to customer</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">TrustCart System Architecture</title>
  <desc id="desc">Customer and admin use the React frontend, which connects to a backend API, MongoDB database, and trust score engine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#12233d"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fd1c5"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#a7f3d0"/>
    </marker>
  </defs>
  <rect width="980" height="420" rx="28" fill="url(#bg)"/>
  <g opacity="0.15">
    <circle cx="115" cy="70" r="90" fill="#38bdf8"/>
    <circle cx="875" cy="350" r="130" fill="#fb7185"/>
  </g>
  <text x="40" y="56" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">System Architecture</text>
  <text x="40" y="86" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">High-level platform modules and data flow</text>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="52" y="150" width="150" height="74" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="127" y="182" fill="#e0f2fe" text-anchor="middle" font-size="17" font-weight="700">Customer</text>
    <text x="127" y="204" fill="#93c5fd" text-anchor="middle" font-size="13">shops safely</text>

    <rect x="52" y="250" width="150" height="74" rx="16" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="127" y="282" fill="#fef3c7" text-anchor="middle" font-size="17" font-weight="700">Admin</text>
    <text x="127" y="304" fill="#fde68a" text-anchor="middle" font-size="13">manages data</text>

    <rect x="292" y="200" width="175" height="86" rx="18" fill="#10233c" stroke="#4fd1c5" stroke-width="2"/>
    <text x="379.5" y="236" fill="#ecfeff" text-anchor="middle" font-size="18" font-weight="800">React Frontend</text>
    <text x="379.5" y="260" fill="#99f6e4" text-anchor="middle" font-size="13">UI, cart, badges</text>

    <rect x="552" y="200" width="175" height="86" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="639.5" y="236" fill="#eff6ff" text-anchor="middle" font-size="18" font-weight="800">Backend API</text>
    <text x="639.5" y="260" fill="#bfdbfe" text-anchor="middle" font-size="13">Node.js + Express</text>

    <rect x="792" y="125" width="150" height="76" rx="18" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
    <text x="867" y="158" fill="#f5f3ff" text-anchor="middle" font-size="17" font-weight="800">MongoDB</text>
    <text x="867" y="181" fill="#ddd6fe" text-anchor="middle" font-size="13">products, users</text>

    <rect x="792" y="278" width="150" height="76" rx="18" fill="#431407" stroke="#fb923c" stroke-width="2"/>
    <text x="867" y="310" fill="#fff7ed" text-anchor="middle" font-size="16" font-weight="800">Trust Engine</text>
    <text x="867" y="333" fill="#fed7aa" text-anchor="middle" font-size="13">scores products</text>
  </g>

  <g fill="none" stroke="#a7f3d0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M202 187 C238 187 250 221 292 221"/>
    <path d="M202 287 C238 287 250 265 292 265"/>
    <path d="M467 243 L552 243"/>
    <path d="M727 226 C760 210 760 168 792 163"/>
    <path d="M727 260 C760 278 760 315 792 316"/>
  </g>
  <g fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="7 7" marker-end="url(#arrow)">
    <path d="M792 176 C760 195 760 221 727 232"/>
    <path d="M792 303 C760 286 760 263 727 254"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">TrustCart Database Relationship Diagram</title>
  <desc id="desc">Users, sellers, products, reviews, carts, orders, and trust scores are connected in the TrustCart data model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="980" height="560" rx="28" fill="url(#bg)"/>
  <text x="40" y="56" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Database Relationship Diagram</text>
  <text x="40" y="86" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Core entities planned for TrustCart</text>

  <g fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round">
    <path d="M225 205 L360 205"/>
    <path d="M225 326 L360 326"/>
    <path d="M620 205 L755 205"/>
    <path d="M620 326 L755 326"/>
    <path d="M490 160 L490 124 L755 124"/>
    <path d="M490 370 L490 430 L225 430"/>
    <path d="M490 370 L490 430 L755 430"/>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="55" y="145" width="170" height="120" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <rect x="55" y="145" width="170" height="38" rx="16" fill="#0b3b57"/>
    <text x="140" y="170" fill="#e0f2fe" text-anchor="middle" font-size="16" font-weight="900">USER</text>
    <text x="76" y="205" fill="#cbd5e1" font-size="13">id</text>
    <text x="76" y="226" fill="#cbd5e1" font-size="13">name</text>
    <text x="76" y="247" fill="#cbd5e1" font-size="13">email, role</text>

    <rect x="55" y="287" width="170" height="118" rx="16" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <rect x="55" y="287" width="170" height="38" rx="16" fill="#064e3b"/>
    <text x="140" y="312" fill="#ecfdf5" text-anchor="middle" font-size="16" font-weight="900">SELLER</text>
    <text x="76" y="347" fill="#cbd5e1" font-size="13">id</text>
    <text x="76" y="368" fill="#cbd5e1" font-size="13">name</text>
    <text x="76" y="389" fill="#cbd5e1" font-size="13">rating</text>

    <rect x="360" y="160" width="260" height="210" rx="18" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
    <rect x="360" y="160" width="260" height="42" rx="18" fill="#312e81"/>
    <text x="490" y="188" fill="#f5f3ff" text-anchor="middle" font-size="17" font-weight="900">PRODUCT</text>
    <text x="386" y="230" fill="#cbd5e1" font-size="13">id</text>
    <text x="386" y="253" fill="#cbd5e1" font-size="13">title</text>
    <text x="386" y="276" fill="#cbd5e1" font-size="13">price</text>
    <text x="386" y="299" fill="#cbd5e1" font-size="13">sellerId</text>
    <text x="386" y="322" fill="#cbd5e1" font-size="13">trustScoreId</text>

    <rect x="755" y="82" width="170" height="112" rx="16" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <rect x="755" y="82" width="170" height="38" rx="16" fill="#713f12"/>
    <text x="840" y="107" fill="#fef3c7" text-anchor="middle" font-size="16" font-weight="900">TRUST_SCORE</text>
    <text x="776" y="142" fill="#cbd5e1" font-size="13">score</text>
    <text x="776" y="163" fill="#cbd5e1" font-size="13">badge</text>
    <text x="776" y="184" fill="#cbd5e1" font-size="13">reasons</text>

    <rect x="755" y="225" width="170" height="112" rx="16" fill="#0f172a" stroke="#fb7185" stroke-width="2"/>
    <rect x="755" y="225" width="170" height="38" rx="16" fill="#881337"/>
    <text x="840" y="250" fill="#fff1f2" text-anchor="middle" font-size="16" font-weight="900">REVIEW</text>
    <text x="776" y="285" fill="#cbd5e1" font-size="13">rating</text>
    <text x="776" y="306" fill="#cbd5e1" font-size="13">comment</text>
    <text x="776" y="327" fill="#cbd5e1" font-size="13">userId</text>

    <rect x="55" y="430" width="170" height="86" rx="16" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <rect x="55" y="430" width="170" height="36" rx="16" fill="#1d4ed8"/>
    <text x="140" y="454" fill="#eff6ff" text-anchor="middle" font-size="15" font-weight="900">CART_ITEM</text>
    <text x="76" y="488" fill="#cbd5e1" font-size="13">productId</text>
    <text x="76" y="508" fill="#cbd5e1" font-size="13">quantity</text>

    <rect x="755" y="430" width="170" height="86" rx="16" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <rect x="755" y="430" width="170" height="36" rx="16" fill="#155e75"/>
    <text x="840" y="454" fill="#ecfeff" text-anchor="middle" font-size="15" font-weight="900">ORDER</text>
    <text x="776" y="488" fill="#cbd5e1" font-size="13">items</text>
    <text x="776" y="508" fill="#cbd5e1" font-size="13">status, total</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#cbd5e1" font-size="12" font-weight="700">
    <text x="270" y="197">writes</text>
    <text x="266" y="318">lists</text>
    <text x="655" y="197">has</text>
    <text x="656" y="318">receives</text>
    <text x="585" y="122">scored by</text>
    <text x="284" y="455">adds</text>
    <text x="610" y="455">ordered in</text>
  </g>
</svg>

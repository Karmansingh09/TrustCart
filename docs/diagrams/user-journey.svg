<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">TrustCart User Journey</title>
  <desc id="desc">A customer browses products, checks the trust score, adds trusted items to cart, or returns to browse safer alternatives.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#67e8f9"/>
    </marker>
  </defs>
  <rect width="980" height="360" rx="28" fill="url(#bg)"/>
  <text x="40" y="56" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">User Journey Flow</text>
  <text x="40" y="86" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">How a buyer moves from discovery to checkout</text>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="38" y="146" width="120" height="66" rx="16" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="98" y="174" fill="#ecfeff" text-anchor="middle" font-size="15" font-weight="800">Open</text>
    <text x="98" y="195" fill="#a5f3fc" text-anchor="middle" font-size="12">TrustCart</text>

    <rect x="205" y="146" width="132" height="66" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="271" y="174" fill="#eff6ff" text-anchor="middle" font-size="15" font-weight="800">Browse</text>
    <text x="271" y="195" fill="#bfdbfe" text-anchor="middle" font-size="12">products</text>

    <rect x="384" y="146" width="132" height="66" rx="16" fill="#111827" stroke="#818cf8" stroke-width="2"/>
    <text x="450" y="174" fill="#eef2ff" text-anchor="middle" font-size="15" font-weight="800">View Details</text>
    <text x="450" y="195" fill="#c7d2fe" text-anchor="middle" font-size="12">price + reviews</text>

    <polygon points="626,126 714,179 626,232 538,179" fill="#27163f" stroke="#f0abfc" stroke-width="2"/>
    <text x="626" y="172" fill="#fae8ff" text-anchor="middle" font-size="15" font-weight="800">Trusted?</text>
    <text x="626" y="194" fill="#f5d0fe" text-anchor="middle" font-size="12">check badge</text>

    <rect x="782" y="82" width="140" height="66" rx="16" fill="#052e2b" stroke="#34d399" stroke-width="2"/>
    <text x="852" y="110" fill="#ecfdf5" text-anchor="middle" font-size="15" font-weight="800">Add to Cart</text>
    <text x="852" y="131" fill="#a7f3d0" text-anchor="middle" font-size="12">continue buying</text>

    <rect x="782" y="224" width="140" height="66" rx="16" fill="#451a03" stroke="#fb923c" stroke-width="2"/>
    <text x="852" y="252" fill="#fff7ed" text-anchor="middle" font-size="15" font-weight="800">Alternatives</text>
    <text x="852" y="273" fill="#fed7aa" text-anchor="middle" font-size="12">avoid risk</text>
  </g>

  <g fill="none" stroke="#67e8f9" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M158 179 L205 179"/>
    <path d="M337 179 L384 179"/>
    <path d="M516 179 L538 179"/>
    <path d="M714 166 C748 150 751 115 782 115"/>
    <path d="M714 193 C748 210 751 257 782 257"/>
  </g>
  <text x="748" y="142" fill="#bbf7d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Yes</text>
  <text x="748" y="230" fill="#fed7aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">No</text>
</svg>

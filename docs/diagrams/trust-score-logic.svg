<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Trust Score Logic</title>
  <desc id="desc">Product price, seller rating, reviews, and product history feed into a trust score engine that produces trusted, caution, or risky badges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#a7f3d0"/>
    </marker>
  </defs>
  <rect width="980" height="420" rx="28" fill="url(#bg)"/>
  <text x="40" y="56" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Trust Score Logic</text>
  <text x="40" y="86" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Inputs are scored, weighted, and converted into a buyer-facing badge</text>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="52" y="122" width="170" height="58" rx="15" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="137" y="157" fill="#e0f2fe" text-anchor="middle" font-size="16" font-weight="800">Price Check</text>

    <rect x="52" y="202" width="170" height="58" rx="15" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
    <text x="137" y="237" fill="#fef3c7" text-anchor="middle" font-size="16" font-weight="800">Seller Rating</text>

    <rect x="52" y="282" width="170" height="58" rx="15" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="137" y="317" fill="#f5f3ff" text-anchor="middle" font-size="16" font-weight="800">Reviews</text>

    <rect x="280" y="202" width="170" height="58" rx="15" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <text x="365" y="237" fill="#ecfdf5" text-anchor="middle" font-size="16" font-weight="800">Product History</text>

    <rect x="516" y="168" width="180" height="126" rx="22" fill="#10233c" stroke="#4fd1c5" stroke-width="3"/>
    <text x="606" y="215" fill="#ecfeff" text-anchor="middle" font-size="20" font-weight="900">Trust Score</text>
    <text x="606" y="243" fill="#99f6e4" text-anchor="middle" font-size="14">weighted engine</text>
    <text x="606" y="266" fill="#99f6e4" text-anchor="middle" font-size="14">0 - 100 score</text>

    <rect x="772" y="98" width="150" height="58" rx="15" fill="#052e2b" stroke="#34d399" stroke-width="2"/>
    <text x="847" y="132" fill="#ecfdf5" text-anchor="middle" font-size="16" font-weight="900">Trusted</text>

    <rect x="772" y="202" width="150" height="58" rx="15" fill="#422006" stroke="#facc15" stroke-width="2"/>
    <text x="847" y="236" fill="#fefce8" text-anchor="middle" font-size="16" font-weight="900">Caution</text>

    <rect x="772" y="306" width="150" height="58" rx="15" fill="#450a0a" stroke="#fb7185" stroke-width="2"/>
    <text x="847" y="340" fill="#fff1f2" text-anchor="middle" font-size="16" font-weight="900">Risky</text>
  </g>

  <g fill="none" stroke="#a7f3d0" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M222 151 C330 151 390 185 516 207"/>
    <path d="M222 231 L516 231"/>
    <path d="M222 311 C330 311 390 277 516 254"/>
    <path d="M450 231 L516 231"/>
    <path d="M696 213 C728 190 735 127 772 127"/>
    <path d="M696 231 L772 231"/>
    <path d="M696 250 C728 274 735 335 772 335"/>
  </g>
  <text x="720" y="158" fill="#bbf7d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">80-100</text>
  <text x="720" y="222" fill="#fef08a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">50-79</text>
  <text x="720" y="303" fill="#fecdd3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">0-49</text>
</svg>
